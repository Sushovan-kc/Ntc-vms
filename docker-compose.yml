version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: app_db
    environment:
      POSTGRES_DB: vehicle_system_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sushovan@123
    ports:
      - "5412:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicle_system_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Django Backend API
  backend:
    build: ./backend
    container_name: app_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. React Frontend
  frontend:
    build: ./frontend
    container_name: app_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_PROXY_TARGET=http://backend:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  # 5. Centrifugo Real-time Engine
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: app_centrifugo
    volumes:
      # FIXED: Map the file directly to Centrifugo's exact internal config directory path
      - ./centrifugo_config.json:/centrifugo/config.json
    ports:
      - "8010:8000"
    env_file:
      - ./backend/.env
    # FIXED: Replaced custom flags with Centrifugo's exact absolute config flag pointer
    command: centrifugo --config=/centrifugo/config.json
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
