services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: app_db
    environment:
      POSTGRES_DB: vehicle_system_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sushovan@123
    ports:
      - "5412:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicle_system_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Django Backend API
  backend:
    build: ./backend
    container_name: app_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. React Frontend
  frontend:
    build: ./frontend
    container_name: app_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

# 🧠 CRUCIAL: These must be aligned completely to the left margin!
volumes:
  postgres_data:
  redis_data:
